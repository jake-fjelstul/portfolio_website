{% extends 'portfolio/base.html' %}
{% load static %}
{% block title %}Writing{% endblock %}

{% block content %}
<!-- WRITING HEADER -->
<section class="hero-section python-hero text-white text-center d-flex align-items-center justify-content-center">
    <div class="z-1 position-relative">
      <div class="hero-glass-card" data-aos="fade-up" data-aos-delay="100">
        <h1 class="display-4 fw-bold" data-aos="zoom-in">Writing</h1>
        <p class="lead mt-3" data-aos="fade-up" data-aos-delay="200">
          Academic research and personal narratives.
        </p>
      </div>
    </div>
  </section>
  

<!-- WRITING TABS SECTION -->
<section class="bg-light text-dark py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <!-- Bootstrap Tabs -->
          <ul class="nav nav-tabs justify-content-center mb-4" id="writingTabs" role="tablist" data-aos="fade-up">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="research-tab" data-bs-toggle="tab" data-bs-target="#research" type="button" role="tab" aria-controls="research" aria-selected="true">
                Research Writing
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="personal-tab" data-bs-toggle="tab" data-bs-target="#personal" type="button" role="tab" aria-controls="personal" aria-selected="false">
                Personal Writing
              </button>
            </li>
          </ul>
          
          <!-- Tab Content -->
          <div class="tab-content" id="writingTabContent" data-aos="fade-up" data-aos-delay="100">
            <!-- Research Writing Tab -->
            <div class="tab-pane fade show active" id="research" role="tabpanel" aria-labelledby="research-tab">
              <div class="row justify-content-center">
                <div class="col-12 text-center mt-4">
                  <p class="lead text-muted">Research writing samples coming soon.</p>
                </div>
              </div>
            </div>
            
            <!-- Personal Writing Tab -->
            <div class="tab-pane fade" id="personal" role="tabpanel" aria-labelledby="personal-tab">
              <div class="row justify-content-center">
                <div class="col-12 text-center mt-4">
                  <p class="lead text-muted">Personal writing samples coming soon.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  
{% endblock %}
