<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Jake Fjelstul{% endblock %}</title>
    <link rel="icon" href="/static/portfolio/img/search.png" type="image/png">


    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">


    <!-- AOS + Vanta -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.cells.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.topology.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>


    <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}?v=2.5">

</head>

<body>
    <!-- Navbar -->
    <nav class="navbar p-3 navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Jake Fjelstul</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/react/">Applications</a></li>
                    <!--<li class="nav-item"><a class="nav-link" href="/django/">Django</a></li>-->
                    <!--<li class="nav-item"><a class="nav-link" href="/rust/">Rust</a></li>-->
                    <!--<li class="nav-item"><a class="nav-link" href="/cpp/">C++</a></li>-->
                    <!--<li class="nav-item"><a class="nav-link" href="/java/">Java</a></li>-->
                    <li class="nav-item"><a class="nav-link" href="/writing/">Writing</a></li>
                    <li class="nav-item"><a class="nav-link" href="/unity/">Games</a></li>
                    <li class="nav-item"><a class="nav-link" href="/city/">Web</a></li>
                    <li class="nav-item"><a class="nav-link" href="/hardware/">Hardware</a></li>
                    <li class="nav-item"><a class="nav-link" href="/timeline/">Timeline</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ai/">AI</a></li>

                </ul>
            </div>
        </div>
        <!-- Global Scroll Progress Bar -->
        <div class="scroll-progress-container">
            <div class="scroll-progress-bar" id="scrollProgress"></div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <!-- CONNECT / RESUME SECTION -->
        <section class="footer-section bg-dark text-light">
            <div class="container text-center" data-aos="fade-up">
                <h4 class="mb-4">Let's Connect</h4>

                <div class="social-links d-flex justify-content-center gap-4 mb-4">
                    <a href="https://github.com/jake-fjelstul" target="_blank" class="social-icon">
                        <i class="bi bi-github"></i>
                    </a>
                    <a href="https://linkedin.com/in/jake-fjelstul" target="_blank" class="social-icon">
                        <i class="bi bi-linkedin"></i>
                    </a>
                </div>

                <a href="{% static 'portfolio/files/resume.pdf' %}" download class="btn btn-outline-info">
                    <i class="bi bi-download me-2"></i> Download My Resume
                </a>
            </div>
        </section>
    </footer>

    <!-- Bootstrap & AOS JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
    <script src="{% static 'portfolio/js/animation.js' %}"></script>

    <!-- Navbar Scroll Progress Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('scrollProgress');
            if (progressBar) {
                let ticking = false;
                window.addEventListener('scroll', () => {
                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            const scrollTop = window.scrollY || document.documentElement.scrollTop;
                            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                            const scrollPercent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                            progressBar.style.width = scrollPercent + '%';
                            ticking = false;
                        });
                        ticking = true;
                    }
                });
            }
        });
    </script>
</body>
</html>
