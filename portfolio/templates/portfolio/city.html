{% extends 'portfolio/base.html' %}
{% load static %}
{% block title %}Neon City{% endblock %}

{% block content %}
<style>
    body { 
        margin: 0; 
        overflow: hidden; 
        background-color: #000; 
    }
    #hud {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        color: #aca4a4;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-weight: bold;
        pointer-events: none;
        background: rgba(45, 92, 185, 0.8);
        padding: 12px 0;
        border-bottom: 4px solid #1b2748;
        backdrop-filter: blur(5px);
        z-index: 10;
    }
    #sub-hud {
        font-size: 0.85em;
        margin-top: 4px;
        color: #938e8e;
        font-weight: normal;
    }
    #tooltip {
        position: absolute;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 8px 12px;
        border-radius: 4px;
        font-family: sans-serif;
        font-size: 14px;
        pointer-events: none; 
        opacity: 0;
        transition: opacity 0.2s;
        transform: translate(-50%, -100%); 
        white-space: nowrap;
        border: 1px solid white;
        z-index: 20;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    main {
        padding-top: 0 !important;
        height: 100vh;
        position: relative;
        overflow: hidden;
    }
    nav {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
    }
    footer {
        position: relative;
        width: 100%;
        z-index: 100;
        margin-top: 0;
    }
    body {
        overflow-x: hidden;
        margin: 0;
        padding: 0;
    }
    html {
        overflow-x: hidden;
    }
    #scene-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        z-index: 1;
    }
    #hud {
        top: 70px;
    }
</style>

<div id="scene-container">
    <div id="hud">
        SCROLL TO GLIDE &nbsp;|&nbsp; SELECT BUILDINGS FOR INFO
    </div>

    <div id="tooltip">Building Name</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    let camera, scene, renderer, composer;
    let splineCurve;
    let camParent; 
    let sunMesh; 
    
    let progress = 0; 
    let speedVelocity = 0;
    let lookVelocity = 0;
    let currentLookAngle = 0;
    const traffic = [];
    
    // Interaction
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const selectableBuildings = []; 
    let hoveredBuilding = null;
    const tooltip = document.getElementById('tooltip');

    const PATH_WIDTH = 14; 
    const EYE_HEIGHT = 2.5; 
    const BASE_FOV = 60; 

    // Palette
    const palette = [0x00ffff, 0xff00ff, 0x00ff00, 0xffaa00, 0x0099ff];

    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const carGeo = new THREE.BoxGeometry(1.5, 0.5, 4); 
    const GROUND_Y = -50; 

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050520); 
        scene.fog = new THREE.Fog(0x050520, 40, 500); 

        camParent = new THREE.Object3D();
        scene.add(camParent);

        camera = new THREE.PerspectiveCamera(BASE_FOV, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, EYE_HEIGHT, 0); 
        camParent.add(camera);

        renderer = new THREE.WebGLRenderer({ antialias: false }); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.zIndex = '0';
        const sceneContainer = document.getElementById('scene-container');
        if (sceneContainer) {
            sceneContainer.appendChild(renderer.domElement);
        } else {
            document.body.appendChild(renderer.domElement);
        }

        // Bloom Pass
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        bloomPass.threshold = 0.2; 
        
        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // Lights
        const ambient = new THREE.AmbientLight(0xffffff, 0.4); 
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.0); 
        sun.position.set(100, 300, 50);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 4096;
        sun.shadow.mapSize.height = 4096;
        sun.shadow.camera.left = -400; sun.shadow.camera.right = 400;
        sun.shadow.camera.top = 400; sun.shadow.camera.bottom = -400;
        scene.add(sun);

        createWorld();
        createSynthwaveSun(); 

        document.addEventListener('wheel', onScroll, { passive: false });
        window.addEventListener('resize', onWindowResize);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onMouseClick);
    }

    // --- SUN GENERATOR ---
    function createSynthwaveSun() {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');

        // Gradient Sun
        const gradient = ctx.createLinearGradient(0, 0, 0, 512);
        gradient.addColorStop(0, '#ffff00'); 
        gradient.addColorStop(0.5, '#ff00ff'); 
        gradient.addColorStop(1, '#4400ff'); 
        ctx.fillStyle = gradient;
        ctx.fillRect(0,0,512,512);

        // Stripes (Cuts)
        ctx.fillStyle = 'rgba(0,0,0,1)'; 
        for (let y = 256; y < 512; y += 40) {
            const thickness = (y - 256) * 0.05 + 2;
            ctx.fillRect(0, y, 512, thickness);
        }

        const tex = new THREE.CanvasTexture(canvas);
        const sunGeo = new THREE.CircleGeometry(150, 64);
        const sunMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, fog: false });
        
        sunMesh = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sunMesh);
    }

    // --- Interaction ---
    function onMouseMove(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

        function onMouseClick(event) {
            if (hoveredBuilding) {
                window.location.href = hoveredBuilding.userData.url;
            }
        }

    function checkIntersection() {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(selectableBuildings, true);

        if (intersects.length > 0) {
            const objectHit = intersects[0].object;
            let buildingGroup = objectHit;
            while(buildingGroup.parent && buildingGroup.parent.type === 'Group') {
                buildingGroup = buildingGroup.parent;
            }

            if (hoveredBuilding !== buildingGroup) {
                if (hoveredBuilding) resetBuilding(hoveredBuilding);
                hoveredBuilding = buildingGroup;
                highlightBuilding(hoveredBuilding);
                document.body.style.cursor = 'pointer';
                tooltip.innerText = hoveredBuilding.userData.name;
                tooltip.style.opacity = 1;
            }
        } else {
            if (hoveredBuilding) {
                resetBuilding(hoveredBuilding);
                hoveredBuilding = null;
                document.body.style.cursor = 'default';
                tooltip.style.opacity = 0;
            }
        }
    }

    function highlightBuilding(group) {
        group.scale.setScalar(1.1); 
        group.children.forEach(child => {
            if (child.isMesh && child.material.emissive) {
                if(!child.userData.origHex) child.userData.origHex = child.material.emissive.getHex();
                child.material.emissive.setHex(0x00ffff); 
            }
        });
    }

    function resetBuilding(group) {
        group.scale.setScalar(1.0);
        group.children.forEach(child => {
            if (child.isMesh && child.material.emissive) {
                child.material.emissive.setHex(child.userData.origHex || 0x000000);
            }
        });
    }

    function updateTooltipPosition() {
        if (!hoveredBuilding) return;
        const pos = hoveredBuilding.position.clone();
        pos.y += 60; 
        pos.project(camera);
        const x = (pos.x * .5 + .5) * window.innerWidth;
        const y = (-(pos.y * .5) + .5) * window.innerHeight;
        tooltip.style.left = `${x}px`;
        tooltip.style.top = `${y}px`;
    }

    // --- World Gen ---
    function createCityGridTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 1024; canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#111'; ctx.fillRect(0,0,1024,1024);
        ctx.fillStyle = '#222'; 
        for(let i=0; i<1024; i+=64) {
            ctx.fillRect(0, i, 1024, 8);
            ctx.fillRect(i, 0, 8, 1024);
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(50, 50); 
        return tex;
    }

    function createFlatRibbonGeometry(curve, width, steps) {
        const geo = new THREE.BufferGeometry();
        const verts = [];
        const up = new THREE.Vector3(0, 1, 0); 
        const leftPoints = [];
        const rightPoints = [];

        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const pt = curve.getPoint(t);
            const tangent = curve.getTangent(t).normalize();
            let right = new THREE.Vector3().crossVectors(tangent, up).normalize().multiplyScalar(width / 2);
            
            const pL = new THREE.Vector3().copy(pt).sub(right);
            const pR = new THREE.Vector3().copy(pt).add(right);
            
            verts.push(pL.x, pL.y, pL.z, pR.x, pR.y, pR.z); 
            leftPoints.push(pL);
            rightPoints.push(pR);
        }
        
        const indices = [];
        for (let i = 0; i < steps; i++) {
            const i2 = i * 2;
            indices.push(i2, i2 + 1, i2 + 2);
            indices.push(i2 + 2, i2 + 1, i2 + 3);
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        geo.setIndex(indices);
        geo.computeVertexNormals();
        
        return { geo, leftPoints, rightPoints };
    }

    function createNeonLine(points, color) {
        const curve = new THREE.CatmullRomCurve3(points);
        const tubeGeo = new THREE.TubeGeometry(curve, points.length, 0.15, 4, false);
        const tubeMat = new THREE.MeshBasicMaterial({ color: color, toneMapped: false });
        return new THREE.Mesh(tubeGeo, tubeMat);
    }

    function createSpaceDust(curve) {
        const particleCount = 5000;
        const posArray = new Float32Array(particleCount * 3);
        
        for(let i = 0; i < particleCount; i++) {
            const t = Math.random();
            const pt = curve.getPoint(t);
            const r = 40 + Math.random() * 40; 
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            const x = pt.x + r * Math.sin(phi) * Math.cos(theta);
            const y = pt.y + r * Math.sin(phi) * Math.sin(theta);
            const z = pt.z + r * Math.cos(phi);
            posArray[i*3] = x; posArray[i*3+1] = y; posArray[i*3+2] = z;
        }
        
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.6 });
        return new THREE.Points(geo, mat);
    }

    function createComplexBuilding(color, w, h, d, isInteractive, name, url) {
        const group = new THREE.Group();
        if(isInteractive) {
            group.userData = { url: url, name: name };
        }
        const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.2, metalness: 0.5 });
        
        const body = new THREE.Mesh(boxGeo, mat);
        body.scale.set(w, h, d);
        body.position.y = 0; 
        body.castShadow = true;
        group.add(body);
        
        const winGeo = new THREE.BoxGeometry(w*1.01, h*0.8, d*1.01);
        const winMat = new THREE.MeshStandardMaterial({ color: 0x000000, wireframe: true, transparent: true, opacity: 0.3, emissive: 0x000000 });
        const windows = new THREE.Mesh(winGeo, winMat);
        group.add(windows);

        return group;
    }

    // --- Helper to create random traffic paths ---
    function createTrafficLoop(radius, heightOffset) {
        const points = [];
        const segments = 100;
        const noiseSeed = Math.random() * 100;
        for (let i = 0; i < segments; i++) {
            const theta = (i / segments) * Math.PI * 2;
            const r = radius + Math.sin(theta * 3 + noiseSeed) * 40; 
            const x = Math.sin(theta) * r;
            const z = Math.cos(theta) * r;
            const y = Math.sin(theta * 4 + noiseSeed) * 20 + heightOffset;
            points.push(new THREE.Vector3(x, y, z));
        }
        return new THREE.CatmullRomCurve3(points, true);
    }

    function createWorld() {
        const points = [];
        const loopRadius = 150; 
        for (let i = 0; i < 100; i++) {
            const theta = (i / 100) * Math.PI * 2;
            const x = Math.sin(theta) * loopRadius; 
            const z = Math.cos(theta) * loopRadius; 
            const y = Math.sin(theta * 3) * 4 + Math.cos(theta * 5) * 2; 
            points.push(new THREE.Vector3(x, y, z));
        }
        splineCurve = new THREE.CatmullRomCurve3(points, true); 

        const roadData = createFlatRibbonGeometry(splineCurve, PATH_WIDTH, 1200);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4 });
        const road = new THREE.Mesh(roadData.geo, roadMat);
        road.receiveShadow = true;
        scene.add(road);

        const leftNeon = createNeonLine(roadData.leftPoints, 0x00ffff); 
        const rightNeon = createNeonLine(roadData.rightPoints, 0xff00ff); 
        scene.add(leftNeon);
        scene.add(rightNeon);

        scene.add(createSpaceDust(splineCurve));

        const groundGeo = new THREE.PlaneGeometry(4000, 4000);
        groundGeo.rotateX(-Math.PI/2);
        const groundMat = new THREE.MeshStandardMaterial({ map: createCityGridTexture(), roughness: 0.9, color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = GROUND_Y; 
        ground.receiveShadow = true;
        scene.add(ground);

        const iMat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.8 });
        const instances = new THREE.InstancedMesh(boxGeo, iMat, 5000);
        instances.receiveShadow = true;
        const dummy = new THREE.Object3D();
        const colors = [];

        for(let i=0; i<5000; i++) {
            const x = (Math.random() - 0.5) * 3000;
            const z = (Math.random() - 0.5) * 3000;
            const w = Math.random() * 20 + 10;
            const d = Math.random() * 20 + 10;
            const h = Math.random() * 30 + 10; 
            dummy.position.set(x, GROUND_Y + h/2, z);
            dummy.scale.set(w, h, d);
            dummy.updateMatrix();
            instances.setMatrixAt(i, dummy.matrix);
            const col = new THREE.Color(palette[Math.floor(Math.random() * palette.length)]);
            colors.push(col.r, col.g, col.b);
        }
        instances.geometry.setAttribute('color', new THREE.InstancedBufferAttribute(new Float32Array(colors), 3));
        scene.add(instances);

        const steps = 150; 
        let indices = Array.from({length: steps}, (_, i) => i);
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        const selectedIndices = new Set(indices.slice(0, 20));

        for (let i = 0; i < steps; i++) {
            if (Math.random() < 0.2) continue; 
            const t = i / steps;
            const pt = splineCurve.getPointAt(t);
            const tangent = splineCurve.getTangentAt(t).normalize();
            const right = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0,1,0)).normalize();

            const w = Math.random() * 12 + 8; 
            const d = Math.random() * 12 + 8;
            const visibleHeight = Math.random() * 80 + 40; 
            const sinkDepth = 200; 
            const totalH = visibleHeight + sinkDepth; 
            
            const offset = (PATH_WIDTH/2) + (w/2) + 20 + Math.random() * 30;
            const side = Math.random() > 0.5 ? 1 : -1;
            const pos = pt.clone().add(right.multiplyScalar(side * offset));
            
            const color = palette[Math.floor(Math.random() * palette.length)];
            const isInteractive = selectedIndices.has(i);
            let name = "";
            let url = "";
            if(isInteractive) {
                // Alternate between Django and React pages
                const isDjango = Array.from(selectedIndices).indexOf(i) % 2 === 0;
                if (isDjango) {
                    name = "DJANGO PROJECT";
                    url = "/django/";
                } else {
                    name = "REACT PROJECT";
                    url = "/react/";
                }
            }

            const building = createComplexBuilding(color, w, totalH, d, isInteractive, name, url);
            building.position.set(pos.x, (GROUND_Y + visibleHeight) - (totalH / 2), pos.z);

            scene.add(building);
            if(isInteractive) selectableBuildings.push(building);
        }

        // --- NEW VARIED TRAFFIC LOGIC ---
        const trafficLanes = [
            createTrafficLoop(250, GROUND_Y + 30),
            createTrafficLoop(350, GROUND_Y + 60),
            createTrafficLoop(100, GROUND_Y + 20),
            createTrafficLoop(400, 50),
            createTrafficLoop(200, -20)
        ];

        const carMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for(let i=0; i<300; i++) { 
            const speed = 0.0002 + Math.random() * 0.0005;
            const u = Math.random();
            
            const isRed = Math.random() > 0.5;
            const cColor = isRed ? 0xff0000 : 0xffff00; 
            const cMat = new THREE.MeshBasicMaterial({ color: cColor });
            const car = new THREE.Mesh(carGeo, cMat);
            
            const laneIdx = Math.floor(Math.random() * trafficLanes.length);
            
            car.userData = { 
                u: u, 
                speed: speed, 
                curve: trafficLanes[laneIdx]
            };
            
            scene.add(car);
            traffic.push(car);
        }
    }

    function onScroll(event) {
        event.preventDefault(); 
        if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
            speedVelocity -= event.deltaY * 0.00001;
        } else {
            lookVelocity -= event.deltaX * 0.0003;    
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight); 
    }

    function animate() {
        requestAnimationFrame(animate);

        checkIntersection();
        updateTooltipPosition();

        progress += speedVelocity;
        currentLookAngle += lookVelocity;
        speedVelocity *= 0.90; 
        lookVelocity *= 0.85; 

        if (progress < 0) progress += 1;
        if (progress > 1) progress -= 1;
        
        currentLookAngle = Math.max(-1.4, Math.min(1.4, currentLookAngle));

        const positionOnLine = splineCurve.getPointAt(progress);
        let nextT = progress + 0.001;
        if (nextT > 1) nextT -= 1;
        const nextPoint = splineCurve.getPointAt(nextT);
        
        camParent.position.copy(positionOnLine);
        camParent.lookAt(nextPoint);

        camera.position.y = EYE_HEIGHT;
        camera.position.x = 0; 
        camera.rotation.y = currentLookAngle;
        camera.rotation.z = 0;

        // Sun Logic
        if(sunMesh) {
            sunMesh.position.copy(camParent.position);
            sunMesh.position.z -= 800; 
            sunMesh.position.y = 150;  
            sunMesh.lookAt(camera.position);
        }

        // Varied Traffic Update
        const up = new THREE.Vector3(0,1,0);
        traffic.forEach(car => {
            car.userData.u += car.userData.speed;
            if(car.userData.u > 1) car.userData.u -= 1;
            
            const curve = car.userData.curve;
            const pt = curve.getPointAt(car.userData.u);
            const tangent = curve.getTangentAt(car.userData.u).normalize();
            
            car.position.copy(pt);
            car.lookAt(car.position.clone().add(tangent)); 
        });

        composer.render();
    }
</script>
{% endblock %}
